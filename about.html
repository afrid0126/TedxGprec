<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEDx GPREC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{
    background-color:black;
}
.glass-navbar {
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  margin: 1rem auto;
  max-width: 95%;
  padding: 1rem 2rem;
  border: 1px solid rgba(255, 0, 0, 0.3);
  box-shadow: 0 8px 24px rgba(255, 0, 0, 0.2);
}

.logo-img {
  height: 60px;
  object-fit: contain;
  transition: transform 0.3s ease-in-out;
}

.logo-img:hover {
  transform: scale(1.05);
}

.nav-link {
  color: white;
  margin: 0 12px;
  font-weight: 500;
  position: relative;
  transition: all 0.3s ease-in-out;
}

.nav-link::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  background-color: red;
  bottom: -4px;
  left: 0;
  transition: width 0.4s ease;
}

.nav-link:hover {
  color: red;
}

.nav-link:hover::after {
  width: 100%;
}

.navbar-toggler {
  border: 1px solid red;
  background-color: rgba(255, 255, 255, 0.1);
  border-radius: 8px;
}

.navbar-toggler-icon {
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='white' viewBox='0 0 30 30'%3e%3cpath stroke='red' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
}

.nav-link,
.nav-link:visited,
.nav-link:active,
.nav-link:focus {
  color: white !important;
  text-decoration: none;
}

.nav-link:hover {
  color: red !important;
}

@media (max-width: 992px) {
  .glass-navbar {
    border-radius: 0;
    padding: 1rem;
    margin: 0;
    max-width: 100%;
  }

  .navbar-nav {
    background-color: rgba(0, 0, 0, 0.5);
    border-radius: 15px;
    padding: 1rem;
  }

  .nav-link {
    margin: 10px 0;
  }

  .logo-img {
    height: 50px;
  }
}
</style>
</head>
<body>
  <div>
  <nav class="navbar navbar-expand-lg glass-navbar sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand mx-auto" href="index.html">
        <img src="photos\tedex.png" alt="TEDx GPREC" class="logo-img" />
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-center mt-3 mt-lg-0" id="navbarNav">
        <ul class="navbar-nav text-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="theme.html">Theme</a></li>
          <li class="nav-item"><a class="nav-link" href="speakers.html">Speakers</a></li>
          <li class="nav-item"><a class="nav-link" href="performers.html">Performers</a></li>
          <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
          <li class="nav-item"><a class="nav-link" href="sponsors.html">Sponsors</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>


</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
