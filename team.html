<style>
    body{
    background-color:black;
}
.glass-navbar {
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  margin: 1rem auto;
  max-width: 95%;
  padding: 1rem 2rem;
  border: 1px solid rgba(255, 0, 0, 0.3);
  box-shadow: 0 8px 24px rgba(255, 0, 0, 0.2);
}

.logo-img {
  height: 60px;
  object-fit: contain;
  transition: transform 0.3s ease-in-out;
}

.logo-img:hover {
  transform: scale(1.05);
}

.nav-link {
  color: white;
  margin: 0 12px;
  font-weight: 500;
  position: relative;
  transition: all 0.3s ease-in-out;
}

.nav-link::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  background-color: red;
  bottom: -4px;
  left: 0;
  transition: width 0.4s ease;
}

.nav-link:hover {
  color: red;
}

.nav-link:hover::after {
  width: 100%;
}

.navbar-toggler {
  border: 1px solid red;
  background-color: rgba(255, 255, 255, 0.1);
  border-radius: 8px;
}

.navbar-toggler-icon {
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='white' viewBox='0 0 30 30'%3e%3cpath stroke='red' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
}

.nav-link,
.nav-link:visited,
.nav-link:active,
.nav-link:focus {
  color: white !important;
  text-decoration: none;
}

.nav-link:hover {
  color: red !important;
}

@media (max-width: 992px) {
  .glass-navbar {
    border-radius: 0;
    padding: 1rem;
    margin: 0;
    max-width: 100%;
  }

  .navbar-nav {
    background-color: rgba(0, 0, 0, 0.5);
    border-radius: 15px;
    padding: 1rem;
  }

  .nav-link {
    margin: 10px 0;
  }

  .logo-img {
    height: 50px;
  }
}
.section-title {
  text-align: center;
  font-size: 40px;
  color: #ff1a1a;
  padding-top: 60px;
  position: relative;
}

.section-title::after {
  content: "";
  display: block;
  width: 150px;
  height: 3px;
  background: #ff1a1a;
  margin: 15px auto 40px;
}

.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 40px;
  padding: 0 40px 80px;
  justify-items: center;
}

.team-member {
  position: relative;
  width: 220px;
  height: 280px;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 0 12px rgba(255, 26, 26, 0.2);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.team-member:hover {
  transform: translateY(-12px);
  box-shadow: 0 0 24px rgba(255, 26, 26, 0.6);
}

.team-member img {
  width: 100%;
  height: 100%;
  object-fit: cover;
 /* filter: grayscale(100%);*/
  transition: filter 0.5s ease;
}

.team-member:hover img {
  filter: grayscale(0%);
}

.overlay {
  position: absolute;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 100px;
  background-color: rgba(255, 26, 26, 0.9);
  color: white;
  padding: 10px;
  text-align: center;
  transition: bottom 0.4s ease;
}

.team-member:hover .overlay {
  bottom: 0;
}

.overlay h3 {
  margin: 5px 0 0;
  font-size: 18px;
}

.overlay p {
  margin: 0;
  font-style: italic;
  font-size: 14px;
}

.role-heading {
  font-size: 24px;
  color: #ff1a1a;
  margin: 40px 60px 10px;
  border-left: 5px solid #ff1a1a;
  padding-left: 10px;
}

</style>
