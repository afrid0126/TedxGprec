<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEDx GPREC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="Home.css"> 
</head>
<body>
  <div>
    <nav class="navbar navbar-expand-lg glass-navbar sticky-top">
      <div class="container-fluid px-4">
        <a class="navbar-brand mx-auto" href="index.html">
          <img src="photos\tedex.png" alt="TEDx GPREC" class="logo-img" />
        </a>
        
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center mt-3 mt-lg-0" id="navbarNav">
          <ul class="navbar-nav text-center">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="theme.html">Theme</a></li>
            <li class="nav-item"><a class="nav-link" href="speakers.html">Speakers</a></li>
            <li class="nav-item"><a class="nav-link" href="performers.html">Performers</a></li>
            <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
            <li class="nav-item"><a class="nav-link" href="sponsors.html">Sponsors</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </div>

  <section class="vanta-section" id="vanta-bg">
    <div class="countdown">
      <div class="time-group" id="days">
        <div class="flip-card"></div>
        <div class="label">Days</div>
      </div>
      <div class="colon">:</div>
      <div class="time-group" id="hours">
        <div class="flip-card"></div>
        <div class="label">Hours</div>
      </div>
      <div class="colon">:</div>
      <div class="time-group" id="minutes">
        <div class="flip-card"></div>
        <div class="label">Minutes</div>
      </div>
      <div class="colon">:</div>
      <div class="time-group" id="seconds">
        <div class="flip-card"></div>
        <div class="label">Seconds</div>
      </div>
    </div>
    <button class="btn btn-danger start-btn register-btn">REGISTER</button>
  </section>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const targetDate = new Date("2025-07-01T00:00:00").getTime();

    function createFlipCard(digit) {
      const card = document.createElement("div");
      card.className = "flip-card";
      card.innerHTML = `
        <div class="top">${digit}</div>
      `;
      return card;
    }

    function animateDigit(card, newDigit) {
      const top = card.querySelector(".top");

      if (top.textContent === newDigit) return;

      const flipTop = document.createElement("div");
      flipTop.className = "flip-top";
      flipTop.textContent = top.textContent;

      card.appendChild(flipTop);

      setTimeout(() => {
        top.textContent = newDigit;
        flipTop.remove();
      }, 500);
    }

    function updateTimeUnit(id, value) {
      const container = document.getElementById(id);
      const digits = value.toString().padStart(2, '0').split('');

      if (container.children[0].children.length === 0) {
        digits.forEach(d => container.children[0].appendChild(createFlipCard(d)));
      } else {
        for (let i = 0; i < digits.length; i++) {
          animateDigit(container.children[0].children[i], digits[i]);
        }
      }
    }

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      updateTimeUnit('days', days);
      updateTimeUnit('hours', hours);
      updateTimeUnit('minutes', minutes);
      updateTimeUnit('seconds', seconds);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.1.9/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.trunk.min.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      VANTA.TRUNK({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 300.00,
        minWidth: 200.00,
        scale: 1.00,
        scaleMobile: 1.00,
        color: 0xf8064f,
        backgroundColor: 0x000000,
        spacing: 0.50,
        chaos: 10.00
      });
    });
  </script>
</body>
</html>
